# ============================================================
# 精确映射 — 基于会计语义的列映射
# 将决算套表的行/列映射到审计附注模板表格
# ============================================================
# 字段说明：
#   cat:         附注类别标识（对应模板表格用途）
#   sheet_kw:   决算套表中Sheet名称关键词（模糊匹配）
#   table_idx:  模板中表格索引号（python-docx tables序号）
#   tz_cols:    套表中数据列的索引列表（0-based）
#   col_map:    列映射列表 [(套表列索引, 模板列索引, 是否百分比)]
#   data_start: 套表数据起始行（默认为表头+1）
#   name_strip: 行名前缀剥离列表
#   name_exclude: 排除的套表行名关键词
#   aggregations: 跨行聚合规则 [{target, sources, op}]
#   section_headers: 分区标题列表（同名行按section隔离）
#   accumulate: 跨section同名账龄行是否累加
#   keep_empty: 全空数据行是否保留（填0）
#   section:   前五名等section过滤关键词
# ============================================================

# ======== 资产类 ========

# --- 货币资金 ---
- cat: "货币资金-明细"
  sheet_kw: "货币资金_原始数据"
  table_idx: 5
  tz_cols: [3, 4]
  col_map:
    - [0, 1, false]  # 期末→C1
    - [1, 2, false]  # 期初→C2

# --- 应收票据 ---
- cat: "应收票据-分类"
  sheet_kw: "应收票据分类_原始数据"
  table_idx: 13
  # v9修复: C3=期末数→C1(期末账面余额), C6=期初数→C4(期初账面余额)
  tz_cols: [3, 6]
  col_map:
    - [0, 1, false]  # 期末数→C1(期末账面余额)
    - [1, 4, false]  # 期初数→C4(期初账面余额)
  data_start: 6
  # v9: 合计行聚合(票据种类→合计)
  aggregations:
    - target: "合计"
      sources: ["银行承兑汇票", "商业承兑汇票"]
      op: "sum"

# --- 应收账款 ---
- cat: "应收账款-组合(期末)"
  sheet_kw: "应收款项计提坏账准备情况表_原始数据"
  table_idx: 24
  # 套表: C3=期末余额金额, C4=期末余额比例%, C5=坏账准备金额, C6=预期信用损失率, C7=账面净额
  tz_cols: [3, 4, 5, 6, 7]
  col_map:
    - [0, 1, false]   # 账面余额金额 → 模板C1(金额)
    - [1, 2, true]    # 账面余额比例% → 模板C2(比例%)  ×100
    - [2, 3, false]   # 坏账准备金额 → 模板C3(金额)
    - [3, 4, true]    # 预期信用损失率 → 模板C4(计提比例%)  ×100
    - [4, 5, false]   # 账面净额 → 模板C5(账面价值)
  name_exclude: ["其他应收"]  # v9: 排除其他应收款section

- cat: "应收账款-组合(期初)"
  sheet_kw: "应收款项计提坏账准备情况表_原始数据"
  table_idx: 25
  # 套表: C8=期初金额, C9=期初比例%, C10=期初坏账准备, C11=期初损失率
  tz_cols: [8, 9, 10, 11]
  col_map:
    - [0, 1, false]   # 期初账面余额 → C1
    - [1, 2, true]    # 期初比例% → C2 ×100
    - [2, 3, false]   # 期初坏账准备 → C3
    - [3, 4, true]    # 期初损失率 → C4 ×100
  name_exclude: ["其他应收"]  # v9: 排除其他应收款section

- cat: "应收账款-单项计提"
  sheet_kw: "单项计提坏账准备的应收款项_原始数据"
  table_idx: 26
  tz_cols: [4, 5, 7]  # 账面余额, 坏账准备, 预期信用损失率
  col_map:
    - [0, 1, false]
    - [1, 2, false]
    - [2, 3, true]    # 损失率→C3(预期信用损失率%)
  data_start: 5
  name_strip: ["年末", "年初"]
  name_exclude: ["其他应收款", "其他应收"]  # v9: 排除其他应收款section

- cat: "应收账款-组合计提"
  sheet_kw: "应收款项计提坏账准备情况表_原始数据"
  table_idx: 27
  tz_cols: [3, 7]  # 账面余额(期末), 账面净额(期末)
  col_map:
    - [0, 1, false]   # 账面余额→C1
    - [1, 5, false]   # 账面净额→C5
  name_exclude: ["其他应收"]  # v9: 排除其他应收款section

- cat: "应收账款-前五名"
  sheet_kw: "按欠款方归集应收及预付款项期末余额前五名_原始数据"
  table_idx: 30
  tz_cols: [4, 6, 7]  # 账面余额, 占比, 坏账准备
  col_map:
    - [0, 1, false]
    - [1, 2, true]    # 占比→C2(比例%) ×100
    - [2, 3, false]
  data_start: 5
  section: "应收账款"

- cat: "应收账款-账龄"
  sheet_kw: "应收款项计提坏账准备情况表_原始数据"
  table_idx: 23
  # 套表: C3=期末金额, C5=期末坏账准备, C7=期末净额
  #       C8=期初金额, C10=期初坏账准备
  tz_cols: [3, 5, 8, 10]
  accumulate: true  # v9: 跨section同名账龄行累加
  name_exclude: ["其他应收"]  # v10: 排除其他应收款section
  col_map:
    - [0, 1, false]   # 期末金额→C1(期末账面余额)
    - [1, 2, false]   # 期末坏账准备→C2(期末坏账准备)
    - [2, 3, false]   # 期初金额→C3(期初账面余额)
    - [3, 4, false]   # 期初坏账准备→C4(期初坏账准备)
  # v9: 跨section账龄聚合(关联方+非关联方)
  aggregations:
    - target: "1年以内（含1年）"
      sources:
        - "1年以内"
        - "1年以内（含1年）"
        - "其中：1年以内账龄"
      op: "sum"
    - target: "1-2年"
      sources:
        - "1-2年"
        - "1－2年（含2年）"
      op: "sum"
    - target: "2-3年"
      sources:
        - "2-3年"
        - "2－3年（含3年）"
      op: "sum"
    - target: "3年以上"
      sources:
        - "3年以上"
        - "3－4年（含4年）"
        - "4－5年（含5年）"
        - "5年以上"
        - "3-4年"
        - "4-5年"
        - "一、按单项计提坏账准备的应收账款"
      op: "sum"

# 应收账款-坏账准备收回/转回: 该司决算套表中无此数据(T28为收回转回表,不适用)

