# ============================================================
# 会计概念映射
# 将套表中的概念映射到模板中的会计概念
# ============================================================
# 套表概念 → 模板概念

单项计提:
  aging: "3年以上"  # 单项计提→归入3年以上账龄
  reason: "CAS 22.47: 单项计提针对已发生信用减值的金融资产，通常已长期逾期"

组合计提:
  aging: "按实际账龄分布"  # 组合计提→各账龄段

关联方组合:
  disclosure: "关联交易附注"  # 关联方应收款在关联交易附注单独披露
  aging: "通常无账龄细分(回收风险低)"  # 套表不提供账龄明细

账面价值:
  formula: "账面余额 - 坏账准备"
  standard: "CAS 22: 金融资产按摊余成本计量，扣除损失准备后列示"
