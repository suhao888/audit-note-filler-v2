# ============================================================
# 自动合计与验证规则
# 基于 fill_notes.py v10-v12 业务规则引擎提取
# ============================================================

# ============================================================
# 1. 合计行检测规则 (auto_sum_totals)
# ============================================================
auto_sum_detection:
  description: "自动检测模板中的合计行并计算上方各行之和"
  
  # 合计行关键词（行名归一化后匹配）
  total_keywords:
    - "合计"
    - "合  计"
    - "合   计"
    - "合　　　计"
    - "合 计"
    - "合    计"
    - "小计"
    - "小  计"
  
  # 宽松匹配：行名长度≤4且以"合"开头
  loose_match:
    enabled: true
    max_length: 4
    prefix: "合"
  
  # 求和时跳过的行
  skip_patterns:
    # "其中"开头的行（明细项，不计入合计）
    - pattern: "其中"
      type: "contains"
      reason: "其中项是合计项的拆分明细，重复加总会导致虚增"
    
    # 纯"小计"/"合计"行（中间汇总行）
    - pattern: ["小计", "合计"]
      type: "exact_match_norm"
      reason: "中间汇总行在计算最终合计时跳过，避免重复计算"
    
    # v11: 小计行之后的非小计子项
    - pattern: "subtotal_followers"
      type: "logic"
      description: |
        遇到"主营业务小计"类行后，其后的非小计分项行跳过。
        因为小计行本身已计入合计，小计行之后的明细项是小计的组成部分，
        如再计入合计会导致翻倍计算。
      subtotal_markers:
        - "小计"
        - "小  计"
      exclude_if_contains: "合计"  # "合计"不算小计

  # 百分比列特殊处理
  pct_column:
    detection: "检查第1行之后的数据是否含%符号"
    overflow_rule: "若合计>100%，百分比合计显示'—'（无意义）"
    format: "{:,.2f}%"  # 保留两位小数加百分号

# ============================================================
# 2. 加减验证规则 (validate_sums)
# ============================================================
validate_sums:
  description: "验证所有表格中合计行数值是否等于各行数值之和"
  tolerance: 0.02         # 允许差异阈值（元）
  min_check_sum: 0.01     # 最小检测和（低于此值视为无数据）
  
  # 行检测（与auto_sum_detection共用）
  total_row_detection:
    keywords:
      - "合计"
      - "合  计"
      - "合   计"
      - "合　　　计"
      - "合 计"
      - "合    计"
      - "小计"
      - "小  计"
    loose_match: true
  
  skip_patterns:
    - "其中"  # 跳过"其中"项
    - "小计"  # 跳过中间汇总行
    - "合计"  # 跳过纯合计行
  
  # v11: 子项跳过逻辑
  subtotal_skip:
    enabled: true
    description: "小计行后的非小计分项跳过，防止主营业务小计+明细翻倍计算"
    marker: "小计"

# ============================================================
# 3. 税种税率表 (fill_tax_rates)
# ============================================================
tax_rates:
  description: "自动填充税种税率表 T[4] — 标准税率"
  table_index: 4
  tax_name_column: 0       # 税种名称所在列
  rate_column: 2           # 税率值所在列
  overwrite_existing: false  # 已有税率不覆盖
  rates:
    增值税: "13%（一般纳税人）/ 6%（技术服务）"
    城市维护建设税: "7%"
    教育费附加: "3%"
    地方教育费附加: "2%"
    企业所得税: "25%"
    房产税: "1.2%（从价计征）/ 12%（从租计征）"

# ============================================================
# 4. 语义级数据验证 (validate_data)
# ============================================================
validate_data:
  description: "基于会计准则的语义级数据验证 + 跨表勾稽"
  
  cross_checks:
    # 勾稽检查1: 应收账款-账龄合计 = 应收账款-组合计提合计
    - id: "AR_AGING_VS_COMBO"
      desc: "应收账款-账龄表(23)合计 = 应收账款-组合期末(24)合计"
      tables: [23, 24]       # 源表和目标表索引
      source_row: -1          # -1 表示合计行
      source_col: 1           # C1(期末账面余额)
      target_row: -1
      target_col: 1
      tolerance: 0.01
      standard: "CAS 22"
    
    # 勾稽检查2: 账龄表坏账准备 = 组合表坏账准备
    - id: "AR_PROVISION"
      desc: "应收账款-账龄表坏账准备 = 应收账款-组合表坏账准备"
      tables: [23, 24]
      source_row: -1
      source_col: 2           # C2(期末坏账准备)
      target_row: -1
      target_col: 3           # C3(坏账准备金额)
      tolerance: 0.01
    
    # 勾稽检查3: CAS 22 账面价值公式
    - id: "CAS22_NET_VALUE"
      desc: "应收账款账面价值 = 账面余额 - 坏账准备 (CAS 22)"
      table: 24               # 组合计提表
      formula: "balance - provision"
      balance:
        row: -1
        col: 1                # 账面余额
      provision:
        row: -1
        col: 3                # 坏账准备
      net_value:
        row: -1
        col: 5                # 账面净额
      tolerance: 0.01
    
    # 勾稽检查4: 预付款项比例递减
    - id: "PREPAY_PCT"
      desc: "预付款项T34比例列检查：比例应随账龄递减"
      table: 34
      row_range: [2, 7]       # 检查行范围
      col: 2                  # 比例列
      rule: "monotonic_decreasing"
      max_increase_check: 150 # 超过150%不触发检查
  
  # 应付职工薪酬勾稽
  payroll_check:
    description: "CAS 9: T128一、短期薪酬 = T129短期薪酬明细合计"
    total_table: 128
    detail_table: 129
    total_row_name: "一、短期薪酬"  # T128中找该行
    total_col: 2                      # 取第2列数值
    detail_row: -1                    # T129合计行
    detail_col: 2
    tolerance: 0.02

# ============================================================
# 5. 四大主表稽核 (reconcile_with_main_statements)
# ============================================================
reconciliation:
  description: "附注数据与资产负债表/利润表/现金流量表四大主表稽核"
  tolerance: 0.02
  
  # 读取主表配置
  main_statements:
    balance_sheet:
      sheet_keyword: "资产负债表_原始数据"
      exclude_suffix: "续"  # 排除"续"表
      name_column: 1
      value_column: 3
    
    income_statement:
      sheet_keyword: "利润表_原始数据"
      current_col: 3     # 本期列
      prior_col: 4       # 上期列
    
    cash_flow:
      sheet_keyword: "现金流量表_原始数据"
      exclude_keywords: ["间接"]
  
  # 稽核项
  checks:
    # 1. 货币资金附注合计 = BS货币资金
    - id: "CASH"
      desc: "货币资金附注合计 = 资产负债表货币资金"
      note_table: 5
      note_col: 1        # 合计行C1
      bs_item: "货币资金"
      tolerance: 0.02
    
    # 2. 应收账款附注账面价值 = BS应收账款
    - id: "AR"
      desc: "应收账款附注账面价值 = 资产负债表应收账款"
      note_table: 24
      note_col: 5        # C5=账面价值
      bs_item: "应收账款"
      tolerance: 0.02
    
    # 3. 固定资产附注 = BS固定资产
    - id: "FA"
      desc: "固定资产附注 = 资产负债表固定资产"
      note_table: 90
      note_col: 1
      bs_item: "固定资产"
      tolerance: 0.02
    
    # 4. 营业收入附注 = IS营业收入(本期)
    - id: "REVENUE"
      desc: "营业收入附注 = 利润表营业收入(本期)"
      note_table: 166
      note_row: 2
      note_col: 1
      is_item: "营业收入"
      period: "本期"
      tolerance: 0.02
    
    # 5. 现金等价物 = CF期末现金
    - id: "CASH_EQ"
      desc: "现金和现金等价物附注 = 现金流量表期末现金"
      note_table: 207
      note_col: 1
      cf_item: "期末现金"
      tolerance: 0.02
    
    # 6. 实收资本 = BS实收资本
    - id: "CAPITAL"
      desc: "实收资本附注 = 资产负债表实收资本"
      note_table: 159
      note_col: 1
      bs_item: "实收资本"
      tolerance: 0.02
    
    # 7. 应交税费 = BS应交税费
    - id: "TAX_PAYABLE"
      desc: "应交税费附注 = 资产负债表应交税费"
      note_table: 131
      note_col: 1
      bs_item: "应交税费"
      tolerance: 0.02

# ============================================================
# 6. 加粗规则 (fix_table_fonts)
# ============================================================
font_rules:
  description: "修正表格字体：数据行正常，合计/小计行加粗"
  header_row: 0          # 表头行保持原样
  total_keywords:
    - "合计"
    - "合  计"
    - "合   计"
    - "合　　　计"
    - "小计"
    - "小  计"
    - "合    计"
  data_row_bold: false
  total_row_bold: true
